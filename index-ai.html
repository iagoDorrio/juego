<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🎨 Juego de Dibujo con IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            color: white;
            margin: 15px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }

        .header h1 {
            font-size: clamp(24px, 6vw, 42px);
            margin-bottom: 5px;
        }

        .header p {
            font-size: clamp(14px, 3vw, 18px);
            opacity: 0.9;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .api-setup {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            max-width: 600px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .api-setup h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .api-setup input {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            margin: 5px 0;
        }

        .api-setup button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 5px;
            font-weight: bold;
        }

        .api-setup .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .api-setup .help-link {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .canvas-container {
            position: relative;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin: 15px 0;
            overflow: hidden;
        }

        #drawingCanvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .result-container {
            position: relative;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin: 15px 0;
            overflow: hidden;
            display: none;
        }

        .result-container.active {
            display: block;
        }

        #resultImage {
            display: block;
            width: 100%;
            border-radius: 20px;
        }

        .tools-container {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin: 10px 0;
            width: 100%;
            max-width: 600px;
        }

        .section-title {
            font-size: 16px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }

        .color-palette {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .color-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .color-btn:active {
            transform: scale(0.9);
        }

        .color-btn.active {
            border-color: #333;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .size-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .size-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: 3px solid #667eea;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
            color: #667eea;
            font-weight: bold;
        }

        .size-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .size-btn:active {
            transform: scale(0.9);
        }

        .tool-btn {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: inherit;
            min-width: 140px;
        }

        .tool-btn:active {
            transform: scale(0.95);
        }

        .tool-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .eraser-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .clear-btn {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .magic-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            font-size: 24px;
            padding: 20px 40px;
            animation: pulse 2s infinite;
            margin: 15px 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .save-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading.active {
            display: flex;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #f3f3f3;
            border-top: 8px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 20px;
            text-align: center;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            max-width: 600px;
            text-align: center;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .prompt-input {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            max-width: 600px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .prompt-input input {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
        }

        .prompt-input label {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .canvas-container, .result-container {
                width: 95vw;
                max-width: 600px;
            }

            #drawingCanvas, #resultImage {
                width: 100%;
                height: auto;
            }

            .tools-container, .api-setup, .prompt-input {
                width: 95vw;
            }

            .color-btn {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 480px) {
            .color-btn {
                width: 45px;
                height: 45px;
            }

            .size-btn {
                width: 45px;
                height: 45px;
                font-size: 10px;
            }

            .tool-btn {
                padding: 12px 20px;
                font-size: 16px;
                min-width: 120px;
            }

            .magic-btn {
                font-size: 20px;
                padding: 15px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 Juego de Dibujo con IA 🤖</h1>
        <p>¡Dibuja y la IA lo transformará!</p>
    </div>

    <div class="api-setup" id="apiSetup">
        <h3>🔑 Configuración de API (Gratis)</h3>
        <input type="text" id="apiKey" placeholder="Pega aquí tu API Key de Hugging Face">
        <button onclick="saveApiKey()">💾 Guardar API Key</button>
        <div class="help-text">
            ¿No tienes API Key? 
            <a href="https://huggingface.co/settings/tokens" target="_blank" class="help-link">
                Consigue una GRATIS aquí
            </a> (no requiere tarjeta de crédito)
        </div>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="prompt-input">
        <label for="promptText">💭 ¿Qué estás dibujando?</label>
        <input type="text" id="promptText" placeholder="Ej: una casa, un gato, un coche..." value="un dibujo infantil">
    </div>

    <div class="canvas-container">
        <canvas id="drawingCanvas" width="512" height="512"></canvas>
    </div>

    <div class="result-container" id="resultContainer">
        <img id="resultImage" alt="Resultado IA">
    </div>

    <div class="tools-container">
        <div class="section-title">🎨 Elige tu color</div>
        <div class="color-palette" id="colorPalette">
            <div class="color-btn active" style="background: #FF0000;" data-color="#FF0000"></div>
            <div class="color-btn" style="background: #00FF00;" data-color="#00FF00"></div>
            <div class="color-btn" style="background: #0000FF;" data-color="#0000FF"></div>
            <div class="color-btn" style="background: #FFFF00;" data-color="#FFFF00"></div>
            <div class="color-btn" style="background: #FF00FF;" data-color="#FF00FF"></div>
            <div class="color-btn" style="background: #FF8800;" data-color="#FF8800"></div>
            <div class="color-btn" style="background: #00FFFF;" data-color="#00FFFF"></div>
            <div class="color-btn" style="background: #000000;" data-color="#000000"></div>
        </div>

        <div class="section-title">📏 Tamaño del lápiz</div>
        <div class="size-controls">
            <div class="size-btn" data-size="5">●<br>S</div>
            <div class="size-btn active" data-size="10">●<br>M</div>
            <div class="size-btn" data-size="20">●<br>L</div>
        </div>

        <div class="action-buttons">
            <button class="tool-btn eraser-btn" id="eraserBtn">🧹 Goma</button>
            <button class="tool-btn clear-btn" id="clearBtn">🗑️ Borrar Todo</button>
        </div>
    </div>

    <button class="tool-btn magic-btn" id="magicBtn">🤖 ¡TRANSFORMAR CON IA! 🤖</button>

    <div class="action-buttons">
        <button class="tool-btn save-btn" id="saveBtn">💾 Guardar</button>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Generando con IA...</div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const errorMessage = document.getElementById('errorMessage');
        const resultContainer = document.getElementById('resultContainer');
        const resultImage = document.getElementById('resultImage');

        // API Configuration
        let apiKey = localStorage.getItem('huggingface_api_key') || '';
        if (apiKey) {
            document.getElementById('apiKey').value = apiKey;
            document.getElementById('apiSetup').style.background = '#d4edda';
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) {
                localStorage.setItem('huggingface_api_key', key);
                apiKey = key;
                document.getElementById('apiSetup').style.background = '#d4edda';
                showError('✅ API Key guardada correctamente', false);
            } else {
                showError('⚠️ Por favor introduce una API Key válida');
            }
        }

        function showError(message, isError = true) {
            errorMessage.textContent = message;
            errorMessage.className = 'error-message active';
            errorMessage.style.background = isError ? '#ff6b6b' : '#51cf66';
            setTimeout(() => {
                errorMessage.className = 'error-message';
            }, 5000);
        }

        // Drawing state
        let isDrawing = false;
        let currentColor = '#FF0000';
        let currentSize = 10;
        let isEraser = false;

        // Initialize white background
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Drawing functions
        function startDrawing(e) {
            isDrawing = true;
            const pos = getPosition(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;
            
            e.preventDefault();
            const pos = getPosition(e);
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = currentSize;
            ctx.strokeStyle = isEraser ? 'white' : currentColor;
            
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.beginPath();
        }

        function getPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches && e.touches[0]) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        // Color palette
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
                isEraser = false;
                if (navigator.vibrate) navigator.vibrate(50);
            });
        });

        // Size controls
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentSize = parseInt(this.dataset.size);
                if (navigator.vibrate) navigator.vibrate(50);
            });
        });

        // Eraser button
        document.getElementById('eraserBtn').addEventListener('click', function() {
            isEraser = !isEraser;
            this.style.opacity = isEraser ? '0.6' : '1';
            this.textContent = isEraser ? '✏️ Lápiz' : '🧹 Goma';
            if (navigator.vibrate) navigator.vibrate(100);
        });

        // Clear button
        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('¿Quieres borrar todo el dibujo?')) {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                resultContainer.classList.remove('active');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        });

        // AI Transformation
        document.getElementById('magicBtn').addEventListener('click', async function() {
            if (!apiKey) {
                showError('⚠️ Por favor configura tu API Key de Hugging Face primero');
                return;
            }

            loading.classList.add('active');
            loadingText.textContent = '🎨 Analizando tu dibujo...';

            try {
                // Convert canvas to blob
                const imageBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                
                loadingText.textContent = '🤖 Generando imagen con IA...';

                // Get prompt
                const prompt = document.getElementById('promptText').value || 'un dibujo infantil';
                
                // Call Hugging Face API - Using Stable Diffusion img2img
                const response = await fetch(
                    'https://api-inference.huggingface.co/models/runwayml/stable-diffusion-v1-5',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            inputs: `${prompt}, children's drawing style, colorful, simple, cute, high quality`,
                            parameters: {
                                num_inference_steps: 30,
                                guidance_scale: 7.5,
                            }
                        })
                    }
                );

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`API Error: ${response.status} - ${error}`);
                }

                loadingText.textContent = '✨ Casi listo...';

                // Get the generated image
                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);

                // Show result
                resultImage.src = imageUrl;
                resultContainer.classList.add('active');

                loading.classList.remove('active');

                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

                showError('✅ ¡Imagen generada con éxito!', false);

            } catch (error) {
                loading.classList.remove('active');
                console.error('Error:', error);
                showError(`❌ Error: ${error.message}. Verifica tu API Key y conexión a internet.`);
            }
        });

        // Save button
        document.getElementById('saveBtn').addEventListener('click', function() {
            // Check if there's a generated image
            if (resultContainer.classList.contains('active')) {
                // Save the AI generated image
                const link = document.createElement('a');
                link.download = `dibujo-ia-${new Date().getTime()}.png`;
                link.href = resultImage.src;
                link.click();
            } else {
                // Save the original drawing
                const link = document.createElement('a');
                link.download = `dibujo-${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }

            if (navigator.vibrate) navigator.vibrate(200);
        });

        // Prevent context menu on canvas (mobile)
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        // Prevent scrolling when touching the canvas
        document.body.addEventListener('touchmove', function(e) {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });

        console.log('🎨 Juego de Dibujo con IA cargado correctamente! 🤖');
        console.log('- Configura tu API Key de Hugging Face (gratis)');
        console.log('- Dibuja con el ratón o con tu dedo en móvil');
        console.log('- Describe lo que dibujas en el campo de texto');
        console.log('- Pulsa TRANSFORMAR para que la IA genere una imagen');
    </script>
</body>
</html>
